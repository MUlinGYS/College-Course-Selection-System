components:
  schemas:
    ActionEnum:
      enum:
      - approve
      - reject
      type: string
      description: |-
        * `approve` - approve
        * `reject` - reject
    AdminUserWrite:
      type: object
      properties:
        username:
          type: string
          title: 用户名
          description: 必填；长度为150个字符或以下；只能包含字母、数字、特殊字符“@”、“.”、“-”和“_”。
          pattern: ^[\w.@+-]+$
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 6
        email:
          type: string
          format: email
          title: 电子邮件地址
          maxLength: 254
        role:
          $ref: '#/components/schemas/RoleEnum'
        real_name:
          type: string
          default: ''
        student_no:
          type: string
          default: ''
        teacher_no:
          type: string
          default: ''
        phone:
          type: string
          default: ''
        department:
          type: string
          default: ''
        is_enabled:
          type: boolean
          default: true
      required:
      - role
      - username
    ChangePassword:
      type: object
      properties:
        current_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
          minLength: 6
        confirm_password:
          type: string
          writeOnly: true
      required:
      - confirm_password
      - current_password
      - new_password
    ChangePasswordResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
      required:
      - message
      - ok
    Conflict:
      type: object
      properties:
        conflict_key:
          type: string
        term_id:
          type: integer
        term_name:
          type: string
        weekday:
          type: integer
        start_time:
          type: string
          format: time
        end_time:
          type: string
          format: time
        message:
          type: string
        first_enrollment_id:
          type: integer
        first_section_id:
          type: integer
        first_course_code:
          type: string
        first_course_name:
          type: string
        first_section_name:
          type: string
        first_teacher_name:
          type: string
        first_location:
          type: string
        second_enrollment_id:
          type: integer
        second_section_id:
          type: integer
        second_course_code:
          type: string
        second_course_name:
          type: string
        second_section_name:
          type: string
        second_teacher_name:
          type: string
        second_location:
          type: string
      required:
      - conflict_key
      - end_time
      - first_course_code
      - first_course_name
      - first_enrollment_id
      - first_location
      - first_section_id
      - first_section_name
      - first_teacher_name
      - message
      - second_course_code
      - second_course_name
      - second_enrollment_id
      - second_location
      - second_section_id
      - second_section_name
      - second_teacher_name
      - start_time
      - term_id
      - term_name
      - weekday
    Course:
