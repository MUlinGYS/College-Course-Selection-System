openapi: 3.0.3
info:
  title: 高校选课系统 API
  version: 1.0.0
  description: 基于 Django REST Framework 的高校选课系统接口文档。
paths:
  /api/admin/course-applications:
    get:
      operationId: admin_course_applications_retrieve
      description: 管理员查询所有教师开课申报。支持按学期、轮次、教师、状态和关键字筛选；传入 `paginate=1` 时，返回真实分页结构。
      summary: 获取开课申报审核列表
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，从 1 开始。仅在 `paginate=1` 时生效。
      - in: query
        name: page_size
        schema:
          type: integer
        description: 每页条数，默认 10，最大 100。仅在 `paginate=1` 时生效。
      - in: query
        name: paginate
        schema:
          type: string
        description: 传入 `1` 时启用分页返回结构。
      - in: query
        name: q
        schema:
          type: string
        description: 关键字模糊搜索。
      - in: query
        name: round_id
        schema:
          type: integer
        description: 按轮次 ID 筛选。
      - in: query
        name: status
        schema:
          type: string
        description: 按状态筛选，具体可选值以该接口业务状态为准。
      - in: query
        name: teacher_id
        schema:
          type: integer
        description: 按教师用户 ID 筛选。
      - in: query
        name: term_id
        schema:
          type: integer
        description: 按学期 ID 筛选。
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdminCourseApplicationListResponse'
          description: ''
  /api/admin/course-applications/{application_id}/review:
    post:
      operationId: admin_course_applications_review_create
      description: 管理员对待审核开课申报执行通过或驳回。通过后会自动落地为课程和开课班级。
      summary: 审核开课申报
      parameters:
      - in: path
        name: application_id
        schema:
          type: integer
        required: true
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseApplicationReview'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CourseApplicationReview'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CourseApplicationReview'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseApplication'
          description: ''
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: 使用用户名和密码登录，返回访问令牌、刷新令牌和当前用户信息。
      summary: 用户登录
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: 前端调用的退出登录接口，当前仅返回成功标记，由前端自行清理本地令牌。
      summary: 退出登录
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
          description: ''
  /api/auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: 使用刷新令牌换取新的访问令牌。
      summary: 刷新访问令牌
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponseBody'
          description: ''
  /api/courses:
    get:
      operationId: courses_retrieve
      description: 查询课程库。支持关键字搜索；传入 `paginate=1` 时，返回真实分页结构。
      summary: 获取课程列表
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，从 1 开始。仅在 `paginate=1` 时生效。
      - in: query
        name: page_size
        schema:
          type: integer
        description: 每页条数，默认 10，最大 100。仅在 `paginate=1` 时生效。
      - in: query
        name: paginate
        schema:
          type: string
        description: 传入 `1` 时启用分页返回结构。
      - in: query
        name: q
        schema:
          type: string
        description: 关键字模糊搜索。
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCourseListResponse'
          description: ''
    post:
      operationId: courses_create
      description: 管理员创建课程库中的课程基础信息。
      summary: 创建课程
      tags:
      - courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Course'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Course'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Course'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
  /api/courses/{course_id}:
    get:
      operationId: courses_retrieve_2
      description: 根据课程 ID 获取单个课程详情。
      summary: 获取课程详情
      parameters:
      - in: path
        name: course_id
        schema:
          type: integer
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
    put:
      operationId: courses_update
      description: 管理员更新指定课程的基础信息。
      summary: 更新课程
      parameters:
      - in: path
        name: course_id
        schema:
          type: integer
        required: true
      tags:
      - courses
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Course'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Course'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Course'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
          description: ''
    delete:
      operationId: courses_destroy
      description: 管理员删除指定课程。
      summary: 删除课程
      parameters:
      - in: path
        name: course_id
        schema:
          type: integer
        required: true
      tags:
      - courses
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/enrollments:
    get:
      operationId: enrollments_retrieve
      description: 管理员查询系统中的选课记录。支持按轮次、班级、学生和状态筛选；传入 `paginate=1` 时，返回真实分页结构。
      summary: 获取选课记录列表
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，从 1 开始。仅在 `paginate=1` 时生效。
      - in: query
        name: page_size
        schema:
          type: integer
        description: 每页条数，默认 10，最大 100。仅在 `paginate=1` 时生效。
      - in: query
        name: paginate
        schema:
          type: string
        description: 传入 `1` 时启用分页返回结构。
      - in: query
        name: round_id
        schema:
          type: integer
        description: 按轮次 ID 筛选。
      - in: query
        name: section_id
        schema:
          type: integer
        description: 按开课班级 ID 筛选。
      - in: query
        name: status
        schema:
          type: string
        description: 按状态筛选，具体可选值以该接口业务状态为准。
      - in: query
        name: student_id
        schema:
          type: integer
        description: 按学生用户 ID 筛选。
      tags:
      - enrollments
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnrollmentListResponse'
          description: ''
    post:
      operationId: enrollments_create
      description: 学生在开放轮次内提交选课请求。接口会校验轮次开放状态、容量、时间冲突、上限，并使用 Redis 锁做并发保护。
      summary: 提交选课
      tags:
      - enrollments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollmentWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EnrollmentWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EnrollmentWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
          description: ''
  /api/enrollments/{enrollment_id}:
    delete:
      operationId: enrollments_destroy
      description: 学生取消自己已选中的课程。仅在轮次允许退课且轮次处于开放时间内时可执行。
      summary: 退课
      parameters:
      - in: path
        name: enrollment_id
        schema:
          type: integer
        required: true
      tags:
      - enrollments
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/me:
    get:
      operationId: me_retrieve
      description: 返回当前登录用户的基本信息和角色资料。
      summary: 获取当前用户信息
      tags:
      - me
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
    put:
      operationId: me_update
      description: 更新当前登录用户可自行维护的资料字段，如邮箱、姓名、电话和部门。
      summary: 更新当前用户资料
      tags:
      - me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelfProfileUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SelfProfileUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SelfProfileUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
  /api/me/password:
    post:
      operationId: me_password_create
      description: 校验旧密码后更新当前登录用户密码。
      summary: 修改当前用户密码
      tags:
      - me
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePassword'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordResponse'
          description: ''
  /api/my/conflicts:
    get:
      operationId: my_conflicts_retrieve
      description: 学生查询自己已选课程中的时间冲突对。支持按学期筛选；传入 `paginate=1` 时，返回真实分页结构。
      summary: 获取我的冲突课程
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，从 1 开始。仅在 `paginate=1` 时生效。
      - in: query
        name: page_size
        schema:
          type: integer
        description: 每页条数，默认 10，最大 100。仅在 `paginate=1` 时生效。
      - in: query
        name: paginate
        schema:
          type: string
        description: 传入 `1` 时启用分页返回结构。
      - in: query
        name: term_id
        schema:
          type: integer
        description: 按学期 ID 筛选。
      tags:
      - my
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMyConflictListResponse'
          description: ''
  /api/my/enrollments:
    get:
      operationId: my_enrollments_retrieve
      description: 学生查询自己当前已选中的课程。支持按学期筛选；传入 `paginate=1` 时，返回真实分页结构。
      summary: 获取我的已选课程
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，从 1 开始。仅在 `paginate=1` 时生效。
      - in: query
        name: page_size
        schema:
          type: integer
        description: 每页条数，默认 10，最大 100。仅在 `paginate=1` 时生效。
      - in: query
        name: paginate
        schema:
          type: string
        description: 传入 `1` 时启用分页返回结构。
      - in: query
        name: term_id
        schema:
          type: integer
        description: 按学期 ID 筛选。
      tags:
      - my
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMyEnrollmentListResponse'
          description: ''
  /api/my/timetable:
    get:
      operationId: my_timetable_list
      description: 学生获取当前已选课程形成的课表视图，支持按学期筛选。
      summary: 获取我的课表
      parameters:
      - in: query
        name: term_id
        schema:
          type: integer
        description: 按学期 ID 筛选。
      tags:
      - my
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Timetable'
          description: ''
  /api/rounds:
    get:
      operationId: rounds_retrieve
      description: 查询选课轮次。支持按学期筛选；传入 `paginate=1` 时，返回真实分页结构。
      summary: 获取轮次列表
      parameters:
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，从 1 开始。仅在 `paginate=1` 时生效。
      - in: query
        name: page_size
        schema:
          type: integer
        description: 每页条数，默认 10，最大 100。仅在 `paginate=1` 时生效。
      - in: query
        name: paginate
        schema:
          type: string
        description: 传入 `1` 时启用分页返回结构。
      - in: query
        name: term_id
        schema:
          type: integer
        description: 按学期 ID 筛选。
      tags:
      - rounds
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRoundListResponse'
          description: ''
    post:
      operationId: rounds_create
      description: 管理员创建选课轮次，并归属到指定学期。
      summary: 创建轮次
      tags:
      - rounds
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Round'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Round'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Round'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Round'
          description: ''
  /api/rounds/{round_id}:
    get:
      operationId: rounds_retrieve_2
      description: 根据轮次 ID 获取单个轮次详情。
      summary: 获取轮次详情
      parameters:
      - in: path
        name: round_id
        schema:
          type: integer
        required: true
      tags:
      - rounds
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Round'
          description: ''
    put:
      operationId: rounds_update
      description: 管理员更新指定轮次的时间、范围和限制条件。
      summary: 更新轮次
      parameters:
      - in: path
        name: round_id
        schema:
          type: integer
        required: true
      tags:
      - rounds
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Round'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Round'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Round'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Round'
          description: ''
  /api/sections:
    get:
      operationId: sections_retrieve
      description: 查询开课班级。支持按学期、课程、教师和关键字筛选；传入 `paginate=1` 时，返回真实分页结构。
      summary: 获取开课班级列表
      parameters:
      - in: query
        name: course_id
        schema:
          type: integer
        description: 按课程 ID 筛选。
      - in: query
        name: page
        schema:
          type: integer
        description: 页码，从 1 开始。仅在 `paginate=1` 时生效。
      - in: query
        name: page_size
        schema:
          type: integer
        description: 每页条数，默认 10，最大 100。仅在 `paginate=1` 时生效。
      - in: query
        name: paginate
        schema:
          type: string
        description: 传入 `1` 时启用分页返回结构。
      - in: query
        name: q
        schema:
          type: string
        description: 关键字模糊搜索。
      - in: query
        name: teacher_id
        schema:
          type: integer
        description: 按教师用户 ID 筛选。
      - in: query
        name: term_id
        schema:
          type: integer
        description: 按学期 ID 筛选。
      tags:
      - sections
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSectionListResponse'
          description: ''
    post:
      operationId: sections_create
      description: 管理员为课程创建具体开课班级。
      summary: 创建开课班级
      tags:
      - sections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Section'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Section'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Section'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
          description: ''
  /api/sections/{section_id}:
    get:
      operationId: sections_retrieve_2
      description: 根据开课班级 ID 获取详情。
      summary: 获取开课班级详情
      parameters:
      - in: path
        name: section_id
        schema:
          type: integer
        required: true
      tags:
      - sections
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
          description: ''
    put:
      operationId: sections_update
      description: 管理员更新指定开课班级信息。
      summary: 更新开课班级
      parameters:
      - in: path
        name: section_id
        schema:
          type: integer
        required: true
      tags:
      - sections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Section'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Section'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Section'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
          description: ''
    delete:
      operationId: sections_destroy
      description: 管理员删除指定开课班级。
      summary: 删除开课班级
      parameters:
      - in: path
        name: section_id
        schema:
          type: integer
        required: true
      tags:
      - sections
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/teacher/course-applications:
    get:
      operationId: teacher_course_applications_retrieve
      description: 教师查询自己提交的开课申报。支持按学期、轮次、状态和关键字筛选；传入 `paginate=1` 时，返回真实分页结构。
      summary: 获取我的开课申报列表
      parameters:
      - in: query
        name: page
        schema:
          type: integer
